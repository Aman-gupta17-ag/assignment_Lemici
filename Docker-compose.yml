version: '3.8'
services:
  ollama:
    image: ollama/ollama
    ports: ["11434:11434"]
    volumes: ["./ollama:/root/.ollama"]
  api:
    build:
      context: .
      dockerfile: infra/api/Dockerfile
    ports: ["8000:8000"]
    depends_on: [ollama]
    env_file: .env
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - DB_PATH=/app/data/raw/mospi.db
      - VECTOR_PATH=/app/data/processed/chroma
    volumes:
      - ./data:/app/data
  ui:
    build:
      context: .
      dockerfile: infra/ui/Dockerfile
    ports: ["8501:8501"]
    depends_on: [api]
    env_file: .env
    environment:
      - API_URL=http://api:8000
